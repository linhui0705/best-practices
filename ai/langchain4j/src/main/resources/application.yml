# ============================================
# LangChain4j Spring Boot 3.4 Demo 配置文件
# 版本: LangChain4j 0.36.2 + Spring Boot 3.4.1
# ============================================

spring:
  application:
    # 应用名称
    name: langchain4j-demo
  
  # Banner配置
  main:
    banner-mode: console

# ============================================
# 服务器配置
# ============================================
server:
  port: ${SERVER_PORT:8080}

# ============================================
# LangChain4j 核心配置
# ============================================
langchain4j:
  
  # ----------------------------------------
  # OpenAI 模型配置
  # ----------------------------------------
  open-ai:
    # Chat模型配置（用于对话生成）
    chat-model:
      # API密钥 - 请替换为您的OpenAI API Key 或 通义千问 API Key
      # 可以通过环境变量 OPENAI_API_KEY 设置
      api-key: ${OPENAI_API_KEY:your-api-key-here}
      
      # 模型名称：gpt-4, gpt-3.5-turbo, qwen-turbo 等
      model-name: ${OPENAI_MODEL_NAME:qwen-plus}
      
      # 温度参数：0.0-2.0，控制随机性，越低越确定
      temperature: ${OPENAI_TEMPERATURE:0.7}
      
      # 最大生成token数
      max-tokens: ${OPENAI_MAX_TOKENS:2000}
      
      # 超时设置（秒）
      timeout-seconds: ${OPENAI_TIMEOUT_SECONDS:60}
      
      # 自定义Base URL（用于代理或兼容服务）
      # OpenAI原生: https://api.openai.com/v1
      # 通义千问: https://dashscope.aliyuncs.com/compatible-mode/v1
      base-url: ${OPENAI_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
    
    # Embedding模型配置（用于向量嵌入）
    embedding-model:
      api-key: ${OPENAI_API_KEY:your-api-key-here}
      model-name: ${OPENAI_EMBEDDING_MODEL:text-embedding-v3}
      timeout-seconds: ${OPENAI_TIMEOUT_SECONDS:60}

# ============================================
# 日志配置
# ============================================
logging:
  level:
    # 应用日志级别
    net.coderlin.demo.langchain4j: ${LOG_LEVEL_APP:INFO}
    # LangChain4j 调试日志
    dev.langchain4j: ${LOG_LEVEL_LANGCHAIN4J:DEBUG}
    # Spring Web日志
    org.springframework.web: ${LOG_LEVEL_SPRING_WEB:INFO}
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: ${LOG_FILE_PATH:logs/langchain4j-demo.log}

# ============================================
# 自定义AI配置参数
# ============================================
app:
  ai:
    # 默认系统提示词
    default-system-message: ${AI_DEFAULT_SYSTEM_MESSAGE:"你是一个 helpful AI 助手，请用中文回答问题。"}
    # 记忆窗口大小（保留多少轮对话）
    max-memory-messages: ${AI_MAX_MEMORY_MESSAGES:10}
    
    # RAG检索配置
    rag:
      # 最大返回结果数
      max-results: ${AI_RAG_MAX_RESULTS:3}
      # 最小相似度分数（0-1）
      min-score: ${AI_RAG_MIN_SCORE:0.7}
    
    # 文档分割配置
    document-splitter:
      # 最大片段大小（字符数）
      max-size: ${AI_DOC_SPLITTER_MAX_SIZE:500}
      # 最大重叠大小（字符数）
      max-overlap: ${AI_DOC_SPLITTER_MAX_OVERLAP:50}
    
    # 重试配置
    retry:
      # 是否启用重试
      enabled: ${AI_RETRY_ENABLED:true}
      # 最大重试次数
      max-attempts: ${AI_RETRY_MAX_ATTEMPTS:3}
      # 重试间隔（毫秒）
      delay-ms: ${AI_RETRY_DELAY_MS:1000}
